name: Update Rules

# Fetches blessed.rs and runs `cargo run --bin update-suggestions`:
# handcrafted patterns in data/suggestions.json take precedence.

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC
  workflow_dispatch: # manual trigger

env:
  CARGO_TERM_COLOR: always

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Fetch and merge blessed.rs rules
        run: cargo run --bin update-suggestions

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/suggestions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/suggestions.json
          git commit -m "chore: auto-update blessed.rs rules"
          git push
